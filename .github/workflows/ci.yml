name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv (fast installer)
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check .

      - name: Ruff format check
        run: |
          ruff format --check .

      - name: Run tests
        run: |
          pytest -q --tb=short

      - name: Basic security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc || true
