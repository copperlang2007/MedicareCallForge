[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 1
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[healthcheck]
path = "/health"
interval = 30
timeout = 5
maxRetries = 3

[env]
PORT = "8000"
# Add your real secrets via Railway dashboard:
# GHL_API_KEY, TWILIO_*, etc.
